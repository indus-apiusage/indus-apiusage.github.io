name: Sync Usage Data

on:
  workflow_dispatch:
  schedule:
    - cron: "15 * * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Sync usage data
        run: npm run sync
        env:
          FOROPENCODE_BASE_URL: ${{ vars.FOROPENCODE_BASE_URL }}
          FOROPENCODE_SCOPE: ${{ vars.FOROPENCODE_SCOPE }}
          FOROPENCODE_COOKIE: ${{ secrets.FOROPENCODE_COOKIE }}
          FOROPENCODE_USER_ID: ${{ vars.FOROPENCODE_USER_ID }}
          FOROPENCODE_USERNAME: ${{ secrets.FOROPENCODE_USERNAME }}
          FOROPENCODE_PASSWORD: ${{ secrets.FOROPENCODE_PASSWORD }}
          FOROPENCODE_TURNSTILE_TOKEN: ${{ secrets.FOROPENCODE_TURNSTILE_TOKEN }}
          USAGE_TIMEZONE: ${{ vars.USAGE_TIMEZONE }}
          USAGE_LOOKBACK_DAYS: ${{ vars.USAGE_LOOKBACK_DAYS }}
          USAGE_START_DATE: ${{ vars.USAGE_START_DATE }}
          USAGE_END_DATE: ${{ vars.USAGE_END_DATE }}

      - name: Commit updated dashboard data
        run: |
          if git diff --quiet -- docs/data/latest.json; then
            echo "No dashboard data changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/latest.json
          git commit -m "chore: refresh usage dashboard data"
          git push
