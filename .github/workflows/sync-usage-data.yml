name: Sync Usage Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: "sync-usage-data"
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        if: github.event_name == 'workflow_dispatch'
        run: npm test

      - name: Sync usage data and push changes
        run: npm run sync:publish
        env:
          FOROPENCODE_BASE_URL: ${{ vars.FOROPENCODE_BASE_URL }}
          FOROPENCODE_SCOPE: ${{ vars.FOROPENCODE_SCOPE }}
          FOROPENCODE_COOKIE: ${{ secrets.FOROPENCODE_COOKIE }}
          FOROPENCODE_USER_ID: ${{ vars.FOROPENCODE_USER_ID }}
          FOROPENCODE_USERNAME: ${{ secrets.FOROPENCODE_USERNAME }}
          FOROPENCODE_PASSWORD: ${{ secrets.FOROPENCODE_PASSWORD }}
          FOROPENCODE_TURNSTILE_TOKEN: ${{ secrets.FOROPENCODE_TURNSTILE_TOKEN }}
          USAGE_TIMEZONE: ${{ vars.USAGE_TIMEZONE }}
          USAGE_LOOKBACK_DAYS: ${{ vars.USAGE_LOOKBACK_DAYS }}
          USAGE_START_DATE: ${{ vars.USAGE_START_DATE }}
          USAGE_END_DATE: ${{ vars.USAGE_END_DATE }}
